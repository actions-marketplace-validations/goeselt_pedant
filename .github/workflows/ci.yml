---
name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Validate Intent
        uses: goeselt/intent@2dd369992f542d83bdc27975b078e1242eb07190 # v1.2.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set Up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Format Check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            printf 'Files need formatting:\n%s\n' "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build Image
        run: docker build -t pedant:ci .

      - name: Run E2E Scenarios
        run: PEDANT_IMAGE=pedant:ci .github/workflows/fixtures/run.sh --all

      - name: Self-Check
        env:
          INPUT_FIX: 'false'
          INPUT_IGNORE: '.github/workflows/fixtures'
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -e GITHUB_ACTIONS \
            -e INPUT_FIX \
            -e INPUT_IGNORE \
            pedant:ci
